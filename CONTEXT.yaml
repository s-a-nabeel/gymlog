# ------------------------------------------------------------
# CURRENT STATE & KNOWN ISSUES
# ------------------------------------------------------------
current_state:
  status: "MVP complete. Working. No bugs known at commit time."
  tested: "Local Python HTTP server — all files serve correctly"
  not_yet_tested: "Browser end-to-end (requires live CDN access for sql.js WASM)"

known_limitations:
  - "Workout config changes in Settings update WORKOUTS in-memory + localStorage override, but session reload re-reads this override. Works across sessions."
  - "localStorage limit ~5MB. With daily gym logs, this is ~10+ years of data before hitting limit."
  - "sql.js WASM requires HTTP server — does NOT work via file:// protocol directly"

