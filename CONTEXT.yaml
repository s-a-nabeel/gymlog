# ============================================================
# GymLog — Session Context File
# Use this at the start of any new Claude Code session to
# restore full project context instantly.
#
# INSTRUCTIONS FOR USE:
#   Paste this entire file content into Claude Code at the
#   start of a new session with the message:
#   "Read this context and continue development of GymLog"
# ============================================================

project:
  name: GymLog
  description: >
    A personal gym and diet tracking Progressive Web App for Nabeel S.A.
    No backend. SQLite runs in the browser via sql.js (WASM). All data
    persists in localStorage. Deployed as static files on GitHub Pages.
  repo_url: "[ADD YOUR GITHUB PAGES URL HERE after first push]"
  working_dir: "F:/gym"
  last_updated: "2026-06-28"

# ------------------------------------------------------------
# TECH ROLE — Act as a senior frontend web developer
# ------------------------------------------------------------
tech_role:
  persona: Senior frontend developer. Pragmatic, minimal. No frameworks unless justified.
  stack:
    language: Vanilla JavaScript (ES5-compatible for broad support, no transpiler)
    styling: Pure CSS with custom properties (no Tailwind, no preprocessors)
    database: sql.js 1.10.2 (SQLite compiled to WASM) — CDN loaded
    charts: Chart.js 4.4.4 — CDN loaded
    hosting: GitHub Pages (static, free tier)
    build_step: None — files served as-is
  principles:
    - Zero npm install. Zero build step. Open index.html and it works.
    - CDN-only dependencies (sql.js from jsDelivr, Chart.js from jsDelivr)
    - Data stored in localStorage as base64-encoded SQLite binary
    - No frameworks (React/Vue/Angular). Vanilla DOM manipulation only.
    - ES module syntax avoided to keep file:// compatibility for local testing
    - Mobile-first but desktop-capable. Bottom nav on mobile, top nav on desktop.
    - Light theme only (CSS variables ready for dark theme later)

# ------------------------------------------------------------
# UI DESIGN PHILOSOPHY — Sharp, minimal, professional
# ------------------------------------------------------------
ui_design:
  philosophy: >
    Brutalist-minimal. No decoration for decoration's sake. Every visual
    element either communicates information or creates structure. Nothing else.
  color_palette:
    name: Zinc neutrals (Shadcn-inspired)
    bg: "#ffffff"
    bg_2: "#fafafa"
    bg_3: "#f4f4f5"
    border: "#e4e4e7"
    border_strong: "#d4d4d8"
    text_primary: "#09090b"
    text_secondary: "#52525b"
    text_muted: "#a1a1aa"
    accent: "#18181b"
    accent_hover: "#27272a"
    success: "#16a34a"
    danger: "#dc2626"
    warning: "#d97706"
    info: "#2563eb"
  border_radius: "2px — sharp edges, not zero, not rounded"
  typography:
    font: "system-ui stack: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto"
    sizes:
      xs: "0.6875rem (11px)"
      sm: "0.75rem (12px)"
      base: "0.8125rem (13px)"
      md: "0.875rem (14px)"
      lg: "1rem (16px)"
      xl: "1.25rem (20px)"
      hero: "1.625rem (26px)"
    labels: "UPPERCASE + letter-spacing for section labels (0.06–0.08em)"
    numbers: "font-variant-numeric tabular-nums for all timers and counts"
  spacing:
    nav_height_mobile: "60px"
    header_height: "52px"
    content_max_width: "900px"
    content_padding: "1rem mobile / 1.5rem–2rem desktop"
  component_rules:
    - "Borders: 1px solid --border. Never box-shadow for structure (only for overlays)"
    - "Buttons: solid filled (--accent bg) for primary, outlined or ghost for secondary"
    - "Active states: border-bottom accent color for nav tabs, not background highlight"
    - "Forms: inputs have 1px border, 36px height, 2px radius, outline:none + border-color on focus"
    - "Workout badges: colored text only (no background), each workout key has a unique color"
    - "Rest timer: full-color overlay (accent bg), slides up from bottom as fixed element"
    - "PR badge: small amber pill, appears inline in the completed cell"
    - "Next set: amber left-border highlight on the set row"
    - "Done sets: 50% opacity on exercise cells"
  do_not:
    - No gradients
    - No border-radius above 4px
    - No emoji in the app UI itself (only in this file and docs)
    - No animation except slide-up for rest timer and spin for loader
    - No color fills on cards (white/bg-2 only)
    - No shadows on cards (borders only)

# ------------------------------------------------------------
# FILE STRUCTURE
# ------------------------------------------------------------
files:
  index.html: "App shell — header, main content div, bottom nav, CDN script tags"
  css/app.css: "All styles — design tokens, layout, all view components"
  js/data.js: "WORKOUTS object, DEFAULT_SCHEDULE, DAYS, WORKOUT_KEYS, OPENING_BLOCK, DIET_CHECKLISTS"
  js/db.js: >
    DB module (IIFE). Wraps sql.js. Schema + all CRUD operations.
    Key functions: init(), getSetting/setSetting, getSchedule/setScheduleDay,
    createSession/endSession, logSet/getSessionSets, getDietLog/toggleDietItem,
    getLastWeight/getPersonalRecord, getRecentSessions, getWeeklyStats,
    getWorkoutDistribution, exportCSV.
    Persistence: db.export() → base64 → localStorage key 'gymlog_db_v1'
  js/app.js: "Bootstrap (async init), hash routing (#log #progress #settings), nav event wiring"
  js/views/log.js: "LogView IIFE — session timer, rest timer, tick handling, superset rendering"
  js/views/progress.js: "ProgressView IIFE — stats, heatmap, 4 Chart.js charts, session list"
  js/views/settings.js: "SettingsView IIFE — profile, schedule tabs, workout config table"

# ------------------------------------------------------------
# DATABASE SCHEMA
# ------------------------------------------------------------
db_schema:
  persistence: "localStorage key: gymlog_db_v1 (base64 SQLite binary)"
  tables:
    settings:
      cols: "key TEXT PK, value TEXT, updated_at TEXT"
      purpose: "Key-value store for profile and app preferences"
    schedule:
      cols: "week_type TEXT, day_of_week TEXT, workout_key TEXT — PK(week_type, day)"
      purpose: "Which workout key (A/B/C/Home/Abs/Rest) maps to each day"
    sessions:
      cols: "id, date, workout_key, location, start_time, end_time, duration_minutes, sets_completed, sets_planned, remarks, week_type, created_at"
      purpose: "One row per gym session visit"
    set_logs:
      cols: "id, session_id FK, exercise_name, exercise_category, superset_id, superset_pos (A/B), set_number, reps_planned, reps_done, weight_kg, rest_taken, completed_at"
      purpose: "One row per individual set completed — richest table for future analytics"
    diet_logs:
      cols: "id, date, item_id, completed, completed_at, location_type — UNIQUE(date, item_id)"
      purpose: "Daily checklist completion per item"
    body_metrics:
      cols: "id, date UNIQUE, weight_kg, notes, created_at"
      purpose: "Weight tracking over time (auto-logged when settings weight is saved)"

# ------------------------------------------------------------
