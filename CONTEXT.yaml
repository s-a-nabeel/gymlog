# ------------------------------------------------------------
# HOW TO CONTINUE DEVELOPMENT
# ------------------------------------------------------------
development:
  local_testing:
    command: "python -m http.server 8899"
    url: "http://localhost:8899"
    note: "Must use HTTP server, not file:// — sql.js WASM requires it"

  deploy_to_github_pages:
    steps:
      1: "Create repo on github.com (e.g. 'gymlog')"
      2: "git remote add origin https://github.com/YOUR_USERNAME/gymlog.git"
      3: "git branch -M main"
      4: "git push -u origin main"
      5: "GitHub repo → Settings → Pages → Source: Deploy from branch → main → / (root) → Save"
      6: "Wait ~1 min → live at https://YOUR_USERNAME.github.io/gymlog/"
    update_workflow:
      - "Edit files locally"
      - "git add -A && git commit -m 'description'"
      - "git push"
      - "GitHub Pages auto-redeploys in ~30 seconds"

  session_startup_prompt: >
    "I'm continuing development of GymLog, a browser-based gym tracker
     at F:/gym. Read CONTEXT.yaml for full project context. Then [describe
     what you want to add/fix]."
